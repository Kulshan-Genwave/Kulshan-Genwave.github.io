<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7-Day Weather Forecast</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      background: #1a1a2e; 
      color: white; 
      padding: 30px;
    }
    .widget { 
      width: 1800px; 
      margin: 0 auto; 
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); 
      border-radius: 24px; 
      padding: 40px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      position: relative;
    }
    .title { 
      text-align: center; 
      font-size: 32px; 
      margin-bottom: 40px; 
      font-weight: 500;
    }
    .days { display: flex; gap: 25px; }
    .day { 
      flex: 1; 
      background: rgba(255,255,255,0.08); 
      border-radius: 16px; 
      padding: 25px; 
      text-align: center;
    }
    .date { font-size: 20px; margin-bottom: 10px; }
    .icon { font-size: 48px; margin: 15px 0; }
    .temps { font-size: 40px; font-weight: bold; margin-bottom: 20px; }
    .temp-lo { color: #a0c4ff; font-size: 32px; }
    .details { font-size: 18px; }
    .rain { color: #4fd0e7; font-weight: bold; }
    .wind { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
    .wind-arrow { 
      width: 16px; height: 16px; 
      border: solid currentColor; 
      border-width: 0 3px 3px 0; 
      transform-origin: center;
    }
    /* Wind colors */
    .wind-slow { color: #ffffff; }
    .wind-med { color: #4fd0e7; }
    .wind-fast { color: #ffaa00; }
    .wind-storm { color: #ff4444; }
    
    .refresh { 
      position: absolute; 
      top: 40px; right: 40px; 
      width: 50px; height: 50px; 
      border: none; 
      border-radius: 50%; 
      background: rgba(255,255,255,0.2); 
      color: white; 
      font-size: 20px; 
      cursor: pointer;
    }
    .refresh:hover { background: rgba(255,255,255,0.3); }
    .loading, .error { 
      text-align: center; 
      font-size: 24px; 
      padding: 100px 40px;
    }
  </style>
</head>
<body>
  <div class="widget">
    <button class="refresh" onclick="loadWeather()">↻</button>
    <div id="loading" class="loading">Loading...</div>
    <div id="forecast" style="display:none;">
      <div class="title">Brampton, ON - 7 Day Forecast</div>
      <div class="days" id="days"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://api.open-meteo.com/v1/forecast?latitude=43.6850&longitude=-79.7858&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weather_code,wind_speed_10m_max,wind_direction_10m_dominant&timezone=America%2FToronto&forecast_days=7';

    const icons = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌦️', 55: '🌧️', 61: '🌦️', 63: '🌧️', 65: '🌧️',
      71: '❄️', 73: '❄️', 75: '❄️', 80: '🌦️', 81: '🌦️', 82: '🌧️', 95: '⛈️'
    };

    const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];

    function getWindClass(speed) {
      if (speed < 15) return 'wind-slow';
      if (speed < 30) return 'wind-med';
      if (speed < 50) return 'wind-fast';
      return 'wind-storm';
    }

    async function loadWeather() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('forecast').style.display = 'none';
      
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const daily = data.daily;
        
        const daysContainer = document.getElementById('days');
        daysContainer.innerHTML = '';
        
        for (let i = 0; i < 7; i++) {
          const date = new Date(daily.time[i]);
          const dayName = date.toLocaleDateString('en-CA', {weekday: 'short'});
          const dateStr = date.toLocaleDateString('en-CA', {month: 'short', day: 'numeric'});
          
          const high = Math.round(daily.temperature_2m_max[i]);
          const low = Math.round(daily.temperature_2m_min[i]);
          const rainChance = daily.precipitation_probability_max[i];
          const rainAmount = daily.precipitation_sum[i].toFixed(1);
          const windSpeed = Math.round(daily.wind_speed_10m_max[i]);
          const windDir = Math.round(daily.wind_direction_10m_dominant[i] || 0);
          const windDirName = directions[Math.floor(windDir / 45) % 8];
          const weatherCode = daily.weather_code[i];
          const icon = icons[weatherCode] || '🌤️';
          const windClass = getWindClass(windSpeed);
          
          const dayDiv = document.createElement('div');
          dayDiv.className = 'day';
          dayDiv.innerHTML = `
            <div class="date">${dayName}<br><small>${dateStr}</small></div>
            <div class="icon">${icon}</div>
            <div class="temps">${high}° <span class="temp-lo">/ ${low}°</span></div>
            <div class="details">
              <div>Rain: <span class="rain">${rainChance}%</span> (${rainAmount}mm)</div>
              <div class="wind ${windClass}">
                <span class="wind-arrow" style="transform: rotate(${windDir}deg)"></span>
                ${windSpeed}km/h ${windDirName}
              </div>
            </div>
          `;
          daysContainer.appendChild(dayDiv);
        }
        
        document.getElementById('forecast').style.display = 'block';
      } catch (error) {
        document.getElementById('loading').innerHTML = 'Error loading weather. Check internet.';
      }
      
      document.getElementById('loading').style.display = 'none';
    }

    // Load immediately
    loadWeather();
    // Auto refresh every 30 min
    setInterval(loadWeather, 30 * 60 * 1000);
  </script>
</body>
</html>
