<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windy-Style Wide 7-Day Forecast Widget</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; padding: 30px; }
    .widget { width: 1800px; margin: 0 auto; padding: 40px; background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); border-radius: 24px; box-shadow: 0 16px 60px rgba(0,0,0,0.5); position: relative; }
    .title { text-align: center; font-size: 28px; margin-bottom: 40px; opacity: 0.95; font-weight: 500; letter-spacing: 1px; }
    .days { display: flex; justify-content: space-between; gap: 30px; }
    .day { flex: 1; background: rgba(255,255,255,0.06); border-radius: 16px; padding: 30px 25px; transition: transform 0.2s; position: relative; overflow: hidden; }
    .day::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 60px; opacity: 0.3; z-index: 0; }
    .day:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }
    
    .day-content { display: grid; grid-template-rows: auto auto auto 1fr; height: 100%; position: relative; z-index: 1; }
    .day-date { font-size: 20px; opacity: 0.9; margin-bottom: 15px; font-weight: 600; text-align: center; grid-row: 1; }
    .day-date span { display: button; font-size: 16px; opacity: 0.7; font-weight: 400; }
    .day-icon { font-size: 48px; margin: 20px auto; grid-row: 2; justify-self: center; }
    .temps-container { grid-row: 3; position: relative; }
    .day-temps { font-size: 42px; font-weight: 700; margin-bottom: 25px; letter-spacing: -2px; text-align: center; position: relative; }
    .day-lo { color: #a0c4ff; font-weight: 500; font-size: 36px; }
    
    .waveform { position: absolute; top: 0; left: -100%; width: 200%; height: 100%; opacity: 0.4; z-index: 0; }
    
    .day-details { grid-row: 4; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: end; font-size: 18px; opacity: 0.9; line-height: 1.4; }
    .rain-detail, .wind-detail { text-align: center; }
    .rain-label { font-weight: 500; }
    .rain-value { color: #4fd0e7; font-weight: 600; font-size: 20px; }
    .wind-value { font-weight: 600; font-size: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .wind-arrow { width: 20px; height: 20px; border: solid currentColor; border-width: 0 4px 4px 0; transform-origin: center; }
