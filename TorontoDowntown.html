<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7-Day + 3-Day 3-Hourly Weather Forecast</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      background: #1a1a2e; 
      color: white; 
      padding: 30px;
    }
    .widget { 
      width: 2000px; 
      margin: 0 auto 40px; 
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); 
      border-radius: 24px; 
      padding: 40px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      position: relative;
    }
    .title { 
      text-align: center; 
      font-size: 32px; 
      margin-bottom: 40px; 
      font-weight: 500;
    }
    .days { display: flex; gap: 25px; }
    .hours { 
      display: flex; 
      gap: 15px; 
      overflow-x: auto; 
      padding: 10px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.3) transparent;
    }
    .hours::-webkit-scrollbar {
      height: 8px;
    }
    .hours::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }
    .hours::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
    }
    .day, .hour { 
      flex: 1; 
      background: rgba(255,255,255,0.08); 
      border-radius: 16px; 
      padding: 25px; 
      text-align: center;
      min-width: 140px;
    }
    .hour { min-width: 130px; padding: 20px 15px; }
    .date { font-size: 20px; margin-bottom: 10px; }
    .time { font-size: 18px; margin-bottom: 5px; font-weight: 500; }
    .day-name { font-size: 14px; opacity: 0.8; margin-bottom: 8px; }
    .icon { font-size: 48px; margin: 15px 0; }
    .temps { font-size: 40px; font-weight: bold; margin-bottom: 20px; }
    .temp-lo { color: #a0c4ff; font-size: 32px; }
    .hour-temp { font-size: 32px; }
    .details { font-size: 16px; line-height: 1.4; }
    .rain-snow { color: #4fd0e7; font-weight: bold; }
    .wind { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
    .wind-arrow { 
      width: 16px; height: 16px; 
      border: solid currentColor; 
      border-width: 0 3px 3px 0; 
      transform-origin: center;
    }
    .gust { font-size: 14px; opacity: 0.9; margin-top: 4px; }
    /* Wind colors */
    .wind-slow { color: #ffffff; }
    .wind-med { color: #4fd0e7; }
    .wind-fast { color: #ffaa00; }
    .wind-storm { color: #ff4444; }
    
    .refresh { 
      position: absolute; 
      top: 40px; right: 40px; 
      width: 50px; height: 50px; 
      border: none; 
      border-radius: 50%; 
      background: rgba(255,255,255,0.2); 
      color: white; 
      font-size: 20px; 
      cursor: pointer;
    }
    .refresh:hover { background: rgba(255,255,255,0.3); }
    .loading { 
      text-align: center; 
      font-size: 24px; 
      padding: 100px 40px;
    }
    small { opacity: 0.7; font-size: 0.8em; }
  </style>
</head>
<body>
  <!-- 7-Day Forecast Widget -->
  <div class="widget" id="widget1">
    <button class="refresh" onclick="loadWeather()">↻</button>
    <div id="loading1" class="loading">Loading 7-day forecast...</div>
    <div id="forecast1" style="display:none;">
      <div class="title">Brampton, ON - 7 Day Forecast</div>
      <div class="days" id="days1"></div>
    </div>
  </div>

  <!-- 3-Day 3-Hourly Forecast Widget -->
  <div class="widget" id="widget2">
    <button class="refresh" onclick="loadHourly()">↻</button>
    <div id="loading2" class="loading">Loading 3-hourly forecast...</div>
    <div id="forecast2" style="display:none;">
      <div class="title">Brampton, ON - Next 3 Days (Every 3 Hours)</div>
      <div class="hours" id="hours2"></div>
    </div>
  </div>

  <script>
    const LAT = 43.6850;
    const LON = -79.7858;
    
    const icons = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌦️', 55: '🌧️', 61: '🌦️', 63: '🌧️', 65: '🌧️',
      71: '❄️', 73: '❄️', 75: '❄️', 80: '🌦️', 81: '🌦️', 82: '🌧️', 95: '⛈️'
    };

    const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];

    function getWindClass(speed) {
      if (speed < 15) return 'wind-slow';
      if (speed < 30) return 'wind-med';
      if (speed < 50) return 'wind-fast';
      return 'wind-storm';
    }

    // 7-Day Forecast
    async function loadWeather() {
      const loadingEl = document.getElementById('loading1');
      const forecastEl = document.getElementById('forecast1');
      const daysEl = document.getElementById('days1');
      
      loadingEl.style.display = 'block';
      forecastEl.style.display = 'none';
      
      try {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weather_code,wind_speed_10m_max,wind_direction_10m_dominant&timezone=America%2FToronto`);
        const data = await response.json();
        const daily = data.daily;
        
        daysEl.innerHTML = '';
        for (let i = 0; i < 7; i++) {
          const date = new Date(daily.time[i]);
          const dayName = date.toLocaleDateString('en-CA', {weekday: 'short'});
          const dateStr = date.toLocaleDateString('en-CA', {month: 'short', day: 'numeric'});
          
          const high = Math.round(daily.temperature_2m_max[i]);
          const low = Math.round(daily.temperature_2m_min[i]);
          const rainChance = daily.precipitation_probability_max[i];
          const rainAmount = daily.precipitation_sum[i].toFixed(1);
          const windSpeed = Math.round(daily.wind_speed_10m_max[i]);
          const windDir = Math.round(daily.wind_direction_10m_dominant[i] || 0);
          const windDirName = directions[Math.floor(windDir / 45) % 8];
          const weatherCode = daily.weather_code[i];
          const icon = icons[weatherCode] || '🌤️';
          const windClass = getWindClass(windSpeed);
          
          const dayDiv = document.createElement('div');
          dayDiv.className = 'day';
          dayDiv.innerHTML = `
            <div class="date">${dayName}<br><small>${dateStr}</small></div>
            <div class="icon">${icon}</div>
            <div class="temps">${high}° <span class="temp-lo">/ ${low}°</span></div>
            <div class="details">
              <div>Rain/Snow: <span class="rain-snow">${rainChance}%</span> (${rainAmount}mm)</div>
              <div class="wind ${windClass}">
                <span class="wind-arrow" style="transform: rotate(${windDir}deg)"></span>
                ${windSpeed}km/h ${windDirName}
              </div>
            </div>
          `;
          daysEl.appendChild(dayDiv);
        }
        
        forecastEl.style.display = 'block';
      } catch (error) {
        loadingEl.innerHTML = 'Error loading forecast';
      }
      loadingEl.style.display = 'none';
    }

    // 3-Day 3-Hourly Forecast
    async function loadHourly() {
      const loadingEl = document.getElementById('loading2');
      const forecastEl = document.getElementById('forecast2');
      const hoursEl = document.getElementById('hours2');
      
      loadingEl.style.display = 'block';
      forecastEl.style.display = 'none';
      
      try {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,precipitation_probability,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m&timezone=America%2FToronto&forecast_days=3`);
        const data = await response.json();
        const hourly = data.hourly;
        
        hoursEl.innerHTML = '';
        for (let i = 0; i < hourly.time.length; i += 3) {
          const date = new Date(hourly.time[i]);
          const timeStr = date.toLocaleString('en-CA', {hour: '2-digit', minute: '2-digit', hour12: true});
          const dayName = date.toLocaleDateString('en-CA', {weekday: 'short'});
          
          const temp = Math.round(hourly.temperature_2m[i]);
          const rainChance = hourly.precipitation_probability[i];
          const windSpeed = Math.round(hourly.wind_speed_10m[i]);
          const windGust = Math.round(hourly.wind_gusts_10m[i] || 0);
          const windDir = Math.round(hourly.wind_direction_10m[i] || 0);
          const windDirName = directions[Math.floor(windDir / 45) % 8];
          const weatherCode = hourly.weather_code[i];
          const icon = icons[weatherCode] || '🌤️';
          const windClass = getWindClass(windSpeed);
          
          const hourDiv = document.createElement('div');
          hourDiv.className = 'hour';
          hourDiv.innerHTML = `
            <div class="day-name">${dayName}</div>
            <div class="time">${timeStr}</div>
            <div class="icon">${icon}</div>
            <div class="temps hour-temp">${temp}°</div>
            <div class="details">
              <div>Rain/Snow: <span class="rain-snow">${rainChance}%</span></div>
              <div class="wind ${windClass}">
                <span class="wind-arrow" style="transform: rotate(${windDir}deg)"></span>
                ${windSpeed}km/h ${windDirName}
              </div>
              <div class="gust">Gusts: ${windGust}km/h</div>
            </div>
          `;
          hoursEl.appendChild(hourDiv);
        }
        
        forecastEl.style.display = 'block';
      } catch (error) {
        loadingEl.innerHTML = 'Error loading hourly forecast';
      }
      loadingEl.style.display = 'none';
    }

    // Load both on start
    loadWeather();
    loadHourly();
    
    // Auto refresh every 30 minutes
    setInterval(() => {
      loadWeather();
      loadHourly();
    }, 30 * 60 * 1000);
  </script>
</body>
</html>
