<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windy-Style 7-Day Forecast Widget</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; padding: 20px; }
    .widget { max-width: 600px; margin: 0 auto; padding: 25px; background: linear-gradient(135deg, #0f3460 0%, #16213e 100%); border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    .title { text-align: center; font-size: 18px; margin-bottom: 25px; opacity: 0.9; }
    .days { display: flex; justify-content: space-between; gap: 10px; }
    .day { flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px 10px; text-align: center; }
    .day-date { font-size: 14px; opacity: 0.8; margin-bottom: 8px; font-weight: 500; }
    .day-icon { font-size: 28px; margin: 8px 0; }
    .day-temps { font-size: 24px; font-weight: 600; margin-bottom: 12px; letter-spacing: -1px; }
    .day-lo { color: #a0c4ff; font-weight: 400; font-size: 20px; }
    .day-details { font-size: 13px; opacity: 0.85; line-height: 1.4; }
    .rain { color: #4fd0e7; font-weight: 500; }
    .wind { display: flex; align-items: center; justify-content: center; gap: 4px; font-size: 12px; margin-top: 4px; }
    .wind-arrow { width: 10px; height: 10px; border: solid #fff; border-width: 0 2px 2px 0; transform-origin: center; }
    .refresh { position: absolute; top: 25px; right: 25px; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 36px; height: 36px; color: #fff; font-size: 16px; cursor: pointer; opacity: 0.7; transition: all 0.2s; }
    .refresh:hover { opacity: 1; background: rgba(255,255,255,0.2); transform: scale(1.05); }
    .loading { text-align: center; font-size: 16px; font-style: italic; opacity: 0.6; padding: 60px 20px; }
  </style>
</head>
<body>
  <div class="widget" style="position: relative;">
    <button class="refresh" onclick="loadWeather()">↻</button>
    <div id="loading" class="loading">Loading 7-day forecast...</div>
    <div id="content" style="display: none;">
      <div class="title">Brampton, ON - 7 Day Forecast</div>
      <div class="days" id="forecast-days"></div>
    </div>
  </div>

  <script>
    const LAT = 43.6850; // Brampton, ON
    const LON = -79.7858;
    const URL = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weather_code,wind_speed_10m_max,wind_direction_10m_dominant&timezone=America/Toronto`;

    const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
    const icons = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
      45: '🌫️', 48: '🌫️', 51: '🌦️', 53: '🌦️',
      55: '🌧️', 61: '🌦️', 63: '🌧️', 65: '🌧️',
      71: '🌨️', 73: '🌨️', 75: '❄️', 80: '🌦️',
      81: '🌦️', 82: '🌧️', 95: '⛈️'
    };

    async function loadWeather() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('content').style.display = 'none';
      
      try {
        const res = await fetch(URL);
        const data = await res.json();
        const daily = data.daily;
        
        const daysContainer = document.getElementById('forecast-days');
        daysContainer.innerHTML = '';
        
        for (let i = 0; i < 7; i++) {
          const dayDiv = document.createElement('div');
          dayDiv.className = 'day';
          
          const date = new Date(daily.time[i]);
          const dayName = date.toLocaleDateString('en-CA', { weekday: 'short' });
          const dateStr = date.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' });
          
          const hi = Math.round(daily.temperature_2m_max[i]);
          const lo = Math.round(daily.temperature_2m_min[i]);
          const rainProb = daily.precipitation_probability_max[i];
          const rainAmount = daily.precipitation_sum[i].toFixed(1);
          const windSpeed = Math.round(daily.wind_speed_10m_max[i]);
          const windDir = Math.round(daily.wind_direction_10m_dominant[i]);
          const dir = dirs[Math.round(windDir / 45) % 8];
          const iconCode = daily.weather_code[i];
          const icon = icons[iconCode] || '🌤️';
          
          dayDiv.innerHTML = `
            <div class="day-date">${dayName}<br><span style="font-size:12px;opacity:0.7;">${dateStr}</span></div>
            <div class="day-icon">${icon}</div>
            <div class="day-temps">${hi}° <span class="day-lo">/ ${lo}°</span></div>
            <div class="day-details">
              <div>Rain: <span class="rain">${rainProb}%</span> (${rainAmount}mm)</div>
              <div class="wind">
                <span class="wind-arrow" style="transform: rotate(${windDir}deg);"></span>
                ${windSpeed}km/h ${dir}
              </div>
            </div>
          `;
          daysContainer.appendChild(dayDiv);
        }
        
        document.getElementById('content').style.display = 'block';
      } catch (e) {
        document.getElementById('loading').innerHTML = 'Error loading forecast';
      }
      
      document.getElementById('loading').style.display = 'none';
    }

    loadWeather();
    setInterval(loadWeather, 1800000); // Refresh every 30 min for forecast
  </script>
</body>
</html>
